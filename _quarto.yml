project:
  type: default
  render:
    - "01_Prijava_EU_Projekta/index.md"
    - "02_Izvjestaji/Izvjestaj_M1.md"
    - "03_Sastanci/Zapisnik_Kickoff.md"

format:
  pdf:
    documentclass: article
    papersize: a4
    geometry:
      - top=25mm
      - left=25mm
      - right=25mm
      - bottom=25mm
    include-in-header: custom-header.tex
    fontsize: 11pt
    # mainfont: Arial # Zakomentirano jer Linux (GitHub) serveri nemaju Microsoft fontove.
    number-sections: true
    colorlinks: true
    toc: true
    toc-title: "Sadržaj"

  docx:
    reference-doc: template.docx
    number-sections: true
    toc: true
    toc-title: "Sadržaj"

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl
lang: hr
